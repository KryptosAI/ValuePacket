name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install z3-solver
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test
      - run: npm run bench

  bytecode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install halmos==0.3.3 z3-solver
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      # Expectations gate: safe references must PASS, known exploits must FAIL
      # with a counterexample. Any regression or lost trophy fails the job.
      - run: node src/cli.js bytecode --expect
